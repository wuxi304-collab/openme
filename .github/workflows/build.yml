name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Test build and registry checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Generate support matrix
        run: npm run support:matrix

      - name: Verify generated support matrix
        shell: pwsh
        run: |
          if (!(Test-Path SUPPORT_MATRIX.generated.md)) {
            throw "SUPPORT_MATRIX.generated.md was not created"
          }
          $content = Get-Content SUPPORT_MATRIX.generated.md -Raw
          if ($content -notmatch "Total registered formats") {
            throw "Generated support matrix is missing registry summary"
          }

      - name: Build renderer
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev
        continue-on-error: true
